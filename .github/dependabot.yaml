version: 2
updates:

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "04:15"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "04:15"
    open-pull-requests-limit: 5
    groups:
      github-actions-group:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
