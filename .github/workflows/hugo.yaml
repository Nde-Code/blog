name: Build and deploy the blog

on:

  # Trigger on push to the main branch:
  push:
    branches:
      - main

  # Allow manual trigger from the GitHub Actions user interface:
  workflow_dispatch:

permissions:

  # Minimum security permissions required to interact with GitHub Pages:
  contents: read       # Needed to clone the repository content.
  pages: write         # Needed to deploy artifacts to GitHub Pages.
  id-token: write      # Needed to secure deployment authentication via OIDC.

concurrency:

  # Manage concurrent runs to avoid deployment conflicts:
  group: pages

  # Do not cancel a deployment already in progress:
  cancel-in-progress: false 

defaults:

  # Apply default settings for all run steps:
  run:

    # Use Bash shell universally:
    shell: bash 

jobs:

  # 1st job: building
  # This job downloads dependencies and compiles the Markdown into HTML/CSS:
  build:

    # Run on a clean, temporary Ubuntu environment.
    runs-on: ubuntu-latest 

    # Define tool versions and environment variables:
    env:
      DART_SASS_VERSION: 1.101.0  # Required for compiling modern CSS styles.
      GO_VERSION: 1.26.4          # Required for Hugo Modules.
      HUGO_VERSION: 0.163.3       # Current Hugo version used for building.
      NODE_VERSION: 24.16.0       # Required for theme asset pipelines.
      TZ: Europe/Brussels         # Set local timezone for consistent post dates.

    steps:

      # Step 1: Clone the repository source code onto the runner.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive  # Fetch Git submodules if any exist.
          fetch-depth: 0         # Fetch all history for accurate file modification dates.

      # Step 2: Initialize the Go environment (needed for Hugo Modules).
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false # Disable default caching to handle Hugo cache manually.

      # Step 3: Initialize Node.js environment.
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Step 4: Configure the environment for GitHub Pages deployment.
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      # Step 5: Prepare a local directory for binaries (Dart Sass & Hugo).
      - name: Create directory for user-specific executable files
        run: |
          mkdir -p "${HOME}/.local"

      # Step 6: Download and install Dart Sass compiler.
      - name: Install Dart Sass
        run: |
          curl -sLO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          tar -C "${HOME}/.local" -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          rm "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          echo "${HOME}/.local/dart-sass" >> "${GITHUB_PATH}"

      # Step 7: Download and install Hugo Extended binary.
      - name: Install Hugo
        run: |
          curl -sLO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      # Step 8: Log installed versions in the terminal console for debugging.
      - name: Verify installations
        run: |
          echo "Dart Sass: $(sass --version)"
          echo "Go: $(go version)"
          echo "Hugo: $(hugo version)"
          echo "Node.js: $(node --version)"

      # Step 9: Install project NPM dependencies if a package-lock.json exists.
      - name: Install Node.js dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo "Installing Node.js dependencies..."
            npm ci
          fi

      # Step 10: Tweak Git configuration to prevent escaping non-ASCII characters in paths.
      - name: Configure Git
        run: |
          git config --global core.quotepath false

      # Step 11: Attempt to restore previous build caches to speed up the process.
      - name: Cache restore
        id: cache-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys: |
            hugo-

      # Step 12: Run Hugo compiler to generate static files in the public/ folder.
      - name: Build the site
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "${{ runner.temp }}/hugo_cache"

      # Step 13: Save the new build cache for future execution optimization.
      - name: Cache save
        uses: actions/cache/save@v6
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      # Step 14: Zip and upload the public/ folder content as a GitHub Pages artifact.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          include-hidden-files: false
          path: ./public


  # 2nd job: deploy 
  # This job takes the generated artifact and publishes it online:
  deploy:
    runs-on: ubuntu-latest
    needs: build # Wait for the build job to successfully finish first.

    # Link the run to the official GitHub Pages environment:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    
      # Step 1: Push the uploaded artifact live to your GitHub Pages URL.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
